<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Painel RHI - Controle Industrial</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap');

        body { font-family: 'Rajdhani', sans-serif; background-color: #121212; color: #e0e0e0; text-align: center; padding: 15px; margin: 0; }
        .container { max-width: 420px; margin: 0 auto; }
        
        #relogio-local { font-size: 24px; color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); margin: 10px 0 20px 0; background: #1a1a1a; display: inline-block; padding: 6px 20px; border-radius: 30px; border: 1px solid #333; letter-spacing: 1px; }
        
        h1 { font-size: 14px; text-transform: uppercase; color: #555; letter-spacing: 3px; margin: 5px 0; }
        
        input[type="time"] { width: 100%; background-color: #000; border: 2px solid #ffd700; color: #ffd700; padding: 15px; font-size: 38px; font-family: 'Rajdhani'; border-radius: 10px; text-align: center; box-sizing: border-box; margin-bottom: 20px; outline: none; }

        .painel-led { background: #000; padding: 25px 10px; border-radius: 15px; border: 3px solid #2a2a2a; margin-bottom: 25px; box-shadow: inset 0 0 30px rgba(0,0,0,1); }
        #resultado { font-size: 85px; font-weight: 700; color: #00ff41; text-shadow: 0 0 20px rgba(0, 255, 65, 0.4); line-height: 1; margin: 5px 0; }
        #contador { font-size: 18px; color: #666; letter-spacing: 3px; font-weight: bold; }

        .agenda-section { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; text-align: left; }
        .label-input { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; margin-top: 10px; }
        
        .row-gps { display: flex; gap: 10px; align-items: flex-end; }
        input[type="text"] { width: 100%; background: #000; border: 1px solid #444; color: #aaa; padding: 10px; font-family: 'Rajdhani'; font-size: 13px; border-radius: 6px; box-sizing: border-box; outline: none; }
        
        .btn-gps { background: #333; color: #ffd700; border: 1px solid #444; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 20px; min-width: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-gps:active { background: #ffd700; color: #000; }
        .btn-gps span { font-size: 9px; text-transform: uppercase; margin-top: 2px; font-weight: bold; }

        button { width: 100%; padding: 18px; margin: 5px 0; font-size: 18px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; font-family: 'Rajdhani'; transition: 0.1s; outline: none; }
        .btn-principal { background-color: #ffd700; color: #000; box-shadow: 0 5px 0 #968000; }
        .btn-principal:active { transform: translateY(3px); box-shadow: 0 2px 0 #968000; }
        .btn-salvar { background-color: #2a2a2a; color: #ffd700; font-size: 14px; padding: 12px; margin-top: 10px; }

        #log-container { margin-top: 30px; background: #000; padding: 15px; border-radius: 10px; text-align: left; border: 1px solid #222; }
        .log-item { border-bottom: 1px solid #1a1a1a; padding: 12px 0; }
        .log-meta { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .progress-bg { width: 100%; height: 4px; background: #111; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: #ffd700; transition: width 0.5s; }
        .btn-del { color: #ff4500; font-size: 16px; cursor: pointer; padding: 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="relogio-local">00:00:00</div>

    <h1>Início do Turno</h1>
    <input type="time" id="entrada" oninput="calcular()">

    <div class="painel-led">
        <div id="resultado">--:--</div>
        <div id="contador">--:--:--</div>
    </div>

    <div class="agenda-section">
        <label class="label-input">Localização da Marcação:</label>
        <div class="row-gps">
            <input type="text" id="user-location" placeholder="Clique no Globo para obter">
            <div class="btn-gps" onclick="pegarLocalizacao()" title="Capturar Localização">
                🌍 <span>Localização</span>
            </div>
        </div>

        <label class="label-input">Destinatários (E-mails):</label>
        <input type="text" id="user-emails" placeholder="ex: seu@email.com, supervisor@email.com" onchange="saveSettings()">
        
        <button class="btn-principal" onclick="agendar()">
            <span style="font-size: 11px; display: block; opacity: 0.7; letter-spacing: 1px;">Google Calendar</span>
            Enviar para Agenda
        </button>
    </div>

    <button class="btn-salvar" onclick="salvar()">Salvar no Histórico Local</button>

    <div id="log-container">
        <div style="font-size: 11px; color: #444; margin-bottom: 10px; text-align: center; letter-spacing: 2px;">HISTÓRICO ÚLTIMOS 10 DIAS</div>
        <div id="lista-log"></div>
    </div>
</div>

<script>
    const JORNADA = 588;
    let mSaidaGlobal = null;

    function saveSettings() {
        localStorage.setItem('rhi_emails_list', document.getElementById('user-emails').value);
        localStorage.setItem('rhi_location', document.getElementById('user-location').value);
    }

    function pegarLocalizacao() {
        const campo = document.getElementById('user-location');
        campo.placeholder = "Buscando satélites...";
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrent
