<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Painel de Controle RHI</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap');

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            padding: 15px;
            margin: 0;
        }

        .container { max-width: 420px; margin: 0 auto; position: relative; }

        /* Relógio Local Estilizado */
        #relogio-local {
            font-size: 22px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
            margin-bottom: 15px;
            background: #1e1e1e;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #333;
        }

        h1 { font-size: 20px; text-transform: uppercase; color: #888; letter-spacing: 2px; margin: 10px 0; }

        /* Painel de Configurações */
        .config-box {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
            display: none; /* Escondido por padrão */
            text-align: left;
        }
        
        .config-toggle {
            color: #ffd700;
            cursor: pointer;
            font-size: 14px;
            text-decoration: underline;
            margin-bottom: 15px;
            display: block;
        }

        input[type="time"], input[type="email"] {
            width: 100%;
            background-color: #000;
            border: 1px solid #444;
            color: #ffd700;
            padding: 12px;
            font-size: 20px;
            font-family: 'Rajdhani';
            border-radius: 6px;
            box-sizing: border-box;
            margin-top: 5px;
        }

        input[type="time"] { font-size: 32px; text-align: center; border-color: #ffd700; }

        /* Painel LED Central */
        .painel-led {
            background: #000;
            padding: 25px 10px;
            border-radius: 15px;
            border: 4px solid #2a2a2a;
            margin: 20px 0;
            box-shadow: inset 0 0 30px rgba(0,0,0,1), 0 0 15px rgba(0,0,0,0.5);
        }

        #resultado {
            font-size: 80px;
            font-weight: 700;
            color: #00ff41;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            line-height: 1;
            margin: 5px 0;
        }

        #contador {
            font-size: 18px;
            color: #666;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .falta-pouco { color: #ff8c00 !important; text-shadow: 0 0 10px rgba(255, 140, 0, 0.4) !important; }

        button {
            width: 100%;
            padding: 18px;
            margin: 8px 0;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Rajdhani';
        }

        .btn-principal { background-color: #ffd700; color: #000; box-shadow: 0 5px 0 #968000; }
        .btn-principal:active { transform: translateY(3px); box-shadow: 0 2px 0 #968000; }
        .btn-salvar { background-color: #2a2a2a; color: #ffd700; border: 1px solid #444; }

        /* Log Estendido */
        #log-container {
            margin-top: 30px;
            background: #181818;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            border: 1px solid #333;
        }

        .log-item { border-bottom: 1px solid #252525; padding: 12px 0; position: relative; }
        .log-meta { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .progress-bg { width: 100%; height: 5px; background: #000; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: #ffd700; transition: width 0.5s; }
        .btn-del { color: #ff4500; font-size: 18px; cursor: pointer; padding: 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="relogio-local">00:00:00</div>

    <span class="config-toggle" onclick="toggleConfig()">⚙️ CONFIGURAR E-MAIL</span>
    
    <div id="config-box" class="config-box">
        <label>E-mail para Agenda:</label>
        <input type="email" id="user-email" placeholder="seu-email@exemplo.com" onchange="saveEmail()">
        <p style="font-size: 11px; color: #666; margin-top: 5px;">O e-mail é salvo apenas no seu aparelho.</p>
    </div>

    <h1>Início da Jornada</h1>
    <input type="time" id="entrada" oninput="calcular()">

    <div class="painel-led">
        <div style="font-size: 12px; color: #444; letter-spacing: 2px;">SAÍDA PREVISTA</div>
        <div id="resultado">--:--</div>
        <div id="contador">RESTAM: --:--:--</div>
    </div>

    <button class="btn-principal" onclick="agendar()">Agendar no Google</button>
    <button class="btn-salvar" onclick="salvar()">Salvar Histórico</button>

    <div id="log-container">
        <div style="font-size: 12px; color: #555; margin-bottom: 10px; text-align: center;">LOG DE 10 DIAS</div>
        <div id="lista-log"></div>
    </div>
</div>

<script>
    const JORNADA = 588;
    let mSaidaGlobal = null;

    function toggleConfig() {
        const box = document.getElementById('config-box');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    function saveEmail() {
        const email = document.getElementById('user-email').value;
        localStorage.setItem('user_email_rhi', email);
    }

    function atualizarRelogio() {
        const agora = new Date();
        document.getElementById('relogio-local').innerText = agora.toLocaleTimeString('pt-BR');
    }

    function calcular() {
        const input = document.getElementById('entrada');
        if (!input.value) return;

        const [h, m] = input.value.split(':').map(Number);
        mSaidaGlobal = (h * 60) + m + JORNADA;

        const hS = Math.floor(mSaidaGlobal / 60) % 24;
        const mS = mSaidaGlobal % 60;
        
        document.getElementById('resultado').innerText = `${String(hS).padStart(2,'0')}:${String(mS).padStart(2,'0')}`;
        localStorage.setItem('ultimaEntrada', input.value);
    }

    function atualizarRegressiva() {
        const cont = document.getElementById('contador');
        if (!mSaidaGlobal) return;

        const agora = new Date();
        const mAgora = (agora.getHours() * 60) + agora.getMinutes();
        const sAgora = agora.getSeconds();
        let diffS = (mSaidaGlobal * 60) - ((mAgora * 60) + sAgora);

        if (diffS <= 0) {
            cont.innerText = "JORNADA CONCLUÍDA!";
            cont.className = "concluido";
            return;
        }

        const hF = Math.floor(diffS / 3600);
        const mF = Math.floor((diffS % 3600) / 60);
        const sF = diffS % 60;
        cont.innerText = `RESTAM: ${String(hF).padStart(2,'0')}:${String(mF).padStart(2,'0')}:${String(sF).padStart(2,'0')}`;
        cont.className = hF === 0 ? "falta-pouco" : "";
    }

    function salvar() {
        const e = document.getElementById('entrada').value;
        const s = document.getElementById('resultado').innerText;
        if (!e || s === "--:--") return;

        const logs = JSON.parse(localStorage.getItem('logs_saida_10d') || '[]');
        logs.unshift({ id: Date.now(), data: new Date().toLocaleDateString('pt-BR'), entrada: e, saida: s });
        
        // Limita a 10 registros
        localStorage.setItem('logs_saida_10d', JSON.stringify(logs.slice(0, 10)));
        atualizarLog();
    }

    function atualizarLog() {
        const l = document.getElementById('lista-log');
        const logs = JSON.parse(localStorage.getItem('logs_saida_10d') || '[]');
        const mAg = (new Date().getHours() * 60) + new Date().getMinutes();
        
        l.innerHTML = logs.map(item => {
            const pE = item.entrada.split(':'); const pS = item.saida.split(':');
            const mI = (parseInt(pE[0])*60)+parseInt(pE[1]); let mF = (parseInt(pS[0])*60)+parseInt(pS[1]);
            if (mF < mI) mF += 1440;
            let perc = Math.max(0, Math.min(100, ((mAg - mI) / (mF - mI)) * 100));
            return `<div class="log-item"><div class="log-meta"><span onclick="excluirItem(${item.id})" class="btn-del">✕</span><span><b>${item.data.slice(0,5)}</b></span><span>E: ${item.entrada} | S: ${item.saida}</span></div><div class="progress-bg"><div class="progress-bar" style="width:${perc}%; background:${perc>=100?'#00ff41':'#ffd700'}"></div></div></div>`;
        }).join('');
    }

    function excluirItem(id) {
        let logs = JSON.parse(localStorage.getItem('logs_saida_10d') || '[]').filter(i => i.id !== id);
        localStorage.setItem('logs_saida_10d', JSON.stringify(logs));
        atualizarLog();
    }

    function agendar() {
        const s = document.getElementById('resultado').innerText;
        const email = localStorage.getItem('user_email_rhi') || '';
        if (s === "--:--") return;
        const d = new Date().toISOString().split('T')[0].replace(/-/g,'');
        // Adiciona o e-mail cadastrado à URL da agenda
        const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=SAIDA+RHI&dates=${d}T${s.replace(':','')}00/${d}T${s.replace(':','')}00&add=${email}`;
        window.open(url, '_blank');
    }

    window.onload = () => {
        const e = localStorage.getItem('ultimaEntrada');
        const emailSalvo = localStorage.getItem('user_email_rhi');
        if (e) { document.getElementById('entrada').value = e; calcular(); }
        if (emailSalvo) document.getElementById('user-email').value = emailSalvo;
        
        atualizarLog();
        setInterval(atualizarRelogio, 1000);
        setInterval(() => { atualizarRegressiva(); atualizarLog(); }, 1000);
    };
</script>
</body>
</html>
