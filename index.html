<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Painel RHI - V3</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap');

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            padding: 15px;
            margin: 0;
        }

        .container { max-width: 420px; margin: 0 auto; }

        #relogio-local {
            font-size: 24px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            margin: 10px 0 20px 0;
            background: #1a1a1a;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 30px;
            border: 1px solid #333;
            letter-spacing: 1px;
        }

        h1 { font-size: 14px; text-transform: uppercase; color: #555; letter-spacing: 3px; margin: 5px 0; }

        input[type="time"] {
            width: 100%;
            background-color: #000;
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 15px;
            font-size: 38px;
            font-family: 'Rajdhani';
            border-radius: 10px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .painel-led {
            background: #000;
            padding: 25px 10px;
            border-radius: 15px;
            border: 3px solid #2a2a2a;
            margin-bottom: 25px;
            box-shadow: inset 0 0 30px rgba(0,0,0,1);
        }

        #resultado {
            font-size: 85px;
            font-weight: 700;
            color: #00ff41;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
            line-height: 1;
            margin: 5px 0;
        }

        #contador {
            font-size: 18px;
            color: #666;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .agenda-section {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 10px;
            text-align: left;
        }

        .label-input { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        
        input[type="text"] {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            color: #aaa;
            padding: 10px;
            font-family: 'Rajdhani';
            font-size: 14px;
            border-radius: 6px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 18px;
            margin: 5px 0;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Rajdhani';
        }

        .btn-principal { background-color: #ffd700; color: #000; box-shadow: 0 5px 0 #968000; }
        .btn-salvar { background-color: #2a2a2a; color: #ffd700; font-size: 14px; }

        #log-container { margin-top: 30px; background: #000; padding: 15px; border-radius: 10px; border: 1px solid #222; text-align: left;}
        .log-item { border-bottom: 1px solid #1a1a1a; padding: 12px 0; }
        .log-meta { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .progress-bg { width: 100%; height: 4px; background: #111; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: #ffd700; transition: width 0.5s; }
        .btn-del { color: #ff4500; font-size: 16px; cursor: pointer; padding: 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="relogio-local">--:--:--</div>

    <h1>Início do Turno</h1>
    <input type="time" id="entrada" oninput="calcular()">

    <div class="painel-led">
        <div id="resultado">--:--</div>
        <div id="contador">--:--:--</div>
    </div>

    <div class="agenda-section">
        <label class="label-input">Localização:</label>
        <input type="text" id="user-location" placeholder="RHI Magnesita" oninput="saveSettings()">

        <label class="label-input">Destinatários:</label>
        <input type="text" id="user-emails" placeholder="e-mail1, e-mail2" oninput="saveSettings()">
        
        <button class="btn-principal" onclick="agendar()">Enviar para Agenda</button>
    </div>

    <button class="btn-salvar" onclick="salvar()">Salvar no Histórico Local</button>

    <div id="log-container">
        <div style="font-size: 11px; color: #444; margin-bottom: 10px; text-align: center;">HISTÓRICO 10 DIAS</div>
        <div id="lista-log"></div>
    </div>
</div>

<script>
    const JORNADA = 588;
    let mSaidaGlobal = null;

    function saveSettings() {
        localStorage.setItem('rhi_emails_list', document.getElementById('user-emails').value);
        localStorage.setItem('rhi_location', document.getElementById('user-location').value);
    }

    function atualizarRelogio() {
        const el = document.getElementById('relogio-local');
        if(el) el.innerText = new Date().toLocaleTimeString('pt-BR');
    }

    function calcular() {
        const input = document.getElementById('entrada');
        if (!input || !input.value) return;
        const [h, m] = input.value.split(':').map(Number);
        mSaidaGlobal = (h * 60) + m + JORNADA;
        const hS = Math.floor(mSaidaGlobal / 60) % 24;
        const mS = mSaidaGlobal % 60;
        document.getElementById('resultado').innerText = `${String(hS).padStart(2,'0')}:${String(mS).padStart(2,'0')}`;
        localStorage.setItem('ultimaEntrada', input.value);
    }

    function atualizarRegressiva() {
        const cont = document.getElementById('contador');
        if (!cont || !mSaidaGlobal) return;
        const agora = new Date();
        const mAg = (agora.getHours() * 60) + agora.getMinutes();
        const sAg = agora.getSeconds();
        let diff = (mSaidaGlobal * 60) - ((mAg * 60) + sAg);

        if (diff <= 0) {
            cont.innerText = "TURNO FINALIZADO";
            cont.style.color = "#00ff41";
            return;
        }
        const hF = Math.floor(diff / 3600);
        const mF = Math.floor((diff % 3600) / 60);
        const sF = diff % 60;
        cont.innerText = `FALTAM: ${String(hF).padStart(2,'0')}:${String(mF).padStart(2,'0')}:${String(sF).padStart(2,'0')}`;
        cont.style.color = hF === 0 ? "#ff8c00" : "#666";
    }

    function salvar() {
        const e = document.getElementById('entrada').value;
        const s = document.getElementById('resultado').innerText;
        if (!e || s === "--:--") return;
        const logs = JSON.parse(localStorage.getItem('logs_saida_10d') || '[]');
        logs.unshift({ id: Date.now(), data: new Date().toLocaleDateString('pt-BR'), entrada: e, saida: s });
        localStorage.setItem('logs_saida_10d', JSON.stringify(logs.slice(0, 10)));
        atualizarLog();
    }

    function atualizarLog() {
        const l = document.getElementById('lista-log');
        if(!l) return;
        const logs = JSON.parse(localStorage.getItem('logs_saida_10d') || '[]');
        const mAg = (new Date().getHours() * 60) + new Date().getMinutes();
        l.innerHTML = logs.map(item => {
            const pE = item.entrada.split(':'); const pS = item.saida.split(':');
            const mI = (parseInt(pE[0])*60)+parseInt(pE[1]); let mF = (parseInt(pS[0])*60)+parseInt(pS[1]);
            if (mF < mI) mF += 1440;
            let perc = Math.max(0, Math.min(100, ((mAg - mI) / (mF - mI)) * 100));
            return `<div class="log-item"><div class="log-meta"><span onclick="excluirItem(${item.id})" class="btn-del">✕</span><span><b>${item.data.slice(0,5)}</b></span><span>E: ${item.entrada} | S: ${item.saida}</span></div><div class="progress-bg"><div class="progress-bar" style="width:${perc}%; background:${perc>=100?'#00ff41':'#ffd700'}"></div></div></div>`;
        }).join('');
    }

    function excluirItem(id) {
        let logs = JSON.parse(localStorage.getItem('logs_saida_10d') || '[]').filter(i => i.id !== id);
        localStorage.setItem('logs_saida_10d', JSON.stringify(logs));
        atualizarLog();
    }

    function agendar() {
        const s = document.getElementById('resultado').innerText;
        const emails = document.getElementById('user-emails').value;
        const loc = document.getElementById('user-location').value;
        if (s === "--:--") return;
        const d = new Date().toISOString().split('T')[0].replace(/-/g,'');
        const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=SAIDA+RHI+DANIEL&dates=${d}T${s.replace(':','')}00/${d}T${s.replace(':','')}00&add=${encodeURIComponent(emails)}&location=${encodeURIComponent(loc)}`;
        window.open(url, '_blank');
    }

    window.onload = () => {
        // Recuperar dados
        const e = localStorage.getItem('ultimaEntrada');
        const ems = localStorage.getItem('rhi_emails_list') || "";
        const loc = localStorage.getItem('rhi_location') || "";
        
        if (e) { document.getElementById('entrada').value = e; calcular(); }
        document.getElementById('user-emails').value = ems;
        document.getElementById('user-location').value = loc;

        atualizarLog();
        atualizarRelogio();
        // Loop principal
        setInterval(() => {
            atualizarRelogio();
            atualizarRegressiva();
        }, 1000);
        // Loop secundário para o Log
        setInterval(atualizarLog, 30000);
    };
</script>
</body>
</html>
