<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Painel RHI - Controle de Jornada</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap');

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            padding: 15px;
            margin: 0;
        }

        .container { max-width: 420px; margin: 0 auto; }

        #relogio-local {
            font-size: 24px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            margin: 10px 0 20px 0;
            background: #1a1a1a;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 30px;
            border: 1px solid #333;
            letter-spacing: 1px;
        }

        h1 { font-size: 14px; text-transform: uppercase; color: #555; letter-spacing: 3px; margin: 5px 0; }

        input[type="time"] {
            width: 100%;
            background-color: #000;
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 15px;
            font-size: 38px;
            font-family: 'Rajdhani';
            border-radius: 10px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .painel-led {
            background: #000;
            padding: 25px 10px;
            border-radius: 15px;
            border: 3px solid #2a2a2a;
            margin-bottom: 25px;
            box-shadow: inset 0 0 30px rgba(0,0,0,1);
        }

        #resultado {
            font-size: 85px;
            font-weight: 700;
            color: #00ff41;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
            line-height: 1;
            margin: 5px 0;
        }

        #contador {
            font-size: 18px;
            color: #666;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .agenda-section {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 10px;
            text-align: left;
        }

        .label-input { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        
        input[type="text"] {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            color: #aaa;
            padding: 10px;
            font-family: 'Rajdhani';
            font-size: 14px;
            border-radius: 6px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        input[type="text"]:focus { border-color: #ffd700; color: #fff; }
